# .github/workflows/deploy.yml
name: Deploy Competency Phase2 to Hetzner

on:
  push:
    branches:
      - main  # Deploy only on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key (passphrase-free)
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Deploy via SSH to Hetzner server
      - name: Deploy to Hetzner server
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no root@91.99.231.131 << 'EOF'
            echo "🚀 Starting deployment on Hetzner server..."

            # 1️⃣ Go to root
            cd ~

            # 2️⃣ Remove old repo
            rm -rf competency-phase2

            # 3️⃣ Clone fresh repo
            git clone git@github.com:kriskilsby/competency-phase2.git

            # 4️⃣ Enter repo
            cd competency-phase2

            # 5️⃣ Ensure correct branch
            git checkout main

            # 🔍 Debug (leave this in for now)
            echo "🧠 Latest commit:"
            git log -1 --oneline

            echo "🎯 CSS check:"
            grep graphite frontend/src/app/globals.css || echo "CSS NOT UPDATED"

            # 6️⃣ Stop containers
            docker compose -f docker-compose.yml down --remove-orphans

            # 7️⃣ Build fresh
            docker compose -f docker-compose.yml build --no-cache

            # 8️⃣ Start
            docker compose -f docker-compose.yml up -d

            # 9️⃣ Cleanup
            docker image prune -f

            echo "✅ Deployment complete at $(date)!"
          EOF