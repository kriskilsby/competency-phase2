# .github/workflows/deploy.yml
name: Deploy Competency Phase2 to Hetzner

on:
  push:
    branches:
      - main  # Deploy only on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository (for GitHub Actions context)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup SSH key
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # Deploy via SSH to Hetzner server
      - name: Deploy to Hetzner server
        run: |
          set -e  # Exit on first error
          ssh -o StrictHostKeyChecking=no root@91.99.231.131 << 'EOF'
            echo "🚀 Starting deployment on Hetzner server..."

            # Go to project root
            cd ~/competency-phase2

            # Pull latest code and clean any untracked files
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # 3️⃣ Stop any old containers
            # docker compose -f docker-compose.yml down --remove-orphans
            docker compose down --remove-orphans 

            # 4️⃣ Build fresh images without cache
            # docker compose -f docker-compose.yml build --no-cache
            docker compose build --no-cache

            # 5️⃣ Start containers
            # docker compose -f docker-compose.yml up -d
            docker compose up -d

            # 6️⃣ Optional: clean up dangling images
            docker image prune -f

            echo "✅ Deployment complete at $(date)!"
          EOF