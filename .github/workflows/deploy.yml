# .github/workflows/deploy.yml
name: Deploy Competency Phase 2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo (required for workflow context)
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH agent using GitHub secret
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Add server to known_hosts (avoids prompt)
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H 91.99.231.131 >> ~/.ssh/known_hosts

      # 4️⃣ Deploy on server
      - name: Deploy to server
        run: |
          ssh root@91.99.231.131 << 'EOF'
            set -e

            echo "📦 Navigating to project..."
            cd ~/competency-phase2

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "🧹 Cleaning old containers..."
            docker compose down

            echo "🔨 Building images..."
            docker compose -f docker-compose.yml build

            echo "🚀 Starting containers..."
            docker compose -f docker-compose.yml up -d

            echo "🧽 Cleaning unused Docker resources (safe)..."
            docker system prune -f --filter "until=24h"

            echo "📊 Running containers:"
            docker ps

            echo "✅ Deployment complete"
          EOF