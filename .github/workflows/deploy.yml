# .github/workflows/deploy.yml
name: Deploy Competency Phase2 to Hetzner

on:
  push:
    branches:
      - main  # Deploy only on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository (for workflow context)
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key for server access
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Deploy to Hetzner server
      - name: Deploy to Hetzner server
        run: |
          set -e  # Stop on first error
          ssh -o StrictHostKeyChecking=no root@91.99.231.131 << 'EOF'
            echo "🚀 Starting deployment on Hetzner server..."

            # 1️⃣ Go to project root (create if missing)
            mkdir -p ~/competency-phase2
            cd ~/competency-phase2

            # 2️⃣ Pull latest code safely
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "🧠 Latest commit:"
            git log -1 --oneline

            # 3️⃣ Make sure no old volumes are lingering
            docker compose -f docker-compose.yml down --remove-orphans

            # 4️⃣ Rebuild images fresh with no cache
            docker compose -f docker-compose.yml build --no-cache

            # 5️⃣ Start containers in detached mode
            docker compose -f docker-compose.yml up -d

            # 6️⃣ Optional: remove dangling images
            docker image prune -f

            echo "✅ Deployment complete at $(date)!"
          EOF