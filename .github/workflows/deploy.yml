# .github/workflows/deploy.yml
name: Deploy Competency Phase2 to Hetzner

on:
  push:
    branches:
      - main  # Deploy only on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key (passphrase-free)
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Deploy via SSH to Hetzner server
      - name: Deploy to Hetzner server
        run: |
          set -e  # Exit on first error
          ssh -o StrictHostKeyChecking=no root@91.99.231.131 << 'EOF'
            echo "🚀 Starting deployment on Hetzner server..."
            
            # 1️⃣ Go to project root
            cd ~/competency-phase2

            # 2️⃣ Pull latest code
            # git fetch origin
            # git reset --hard origin/main
            git pull origin main

            # 3️⃣ Make sure no old frontend volume mounts are lingering
            docker compose -f docker-compose.yml down --remove-orphans

            # 4️⃣ Build fresh images (no cache)
            docker compose -f docker-compose.yml build --no-cache

            # 5️⃣ Start containers in detached mode
            docker compose -f docker-compose.yml up -d

            # 6️⃣ Clean up dangling images (optional, lighter than prune -f)
            docker image prune -f

            echo "✅ Deployment complete at $(date)!"
          EOF