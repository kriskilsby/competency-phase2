# .github/workflows/deploy.yml
name: Deploy Competency Phase2 to Hetzner

on:
  push:
    branches:
      - main  # Deploy only on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key (passphrase-free)
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Deploy via SSH to Hetzner server
      - name: Deploy to Hetzner server
        run: |
          set -e  # Exit on first error
          ssh -o StrictHostKeyChecking=no root@91.99.231.131 << 'EOF'
            echo "🚀 Starting deployment on Hetzner server..."
            cd ~/competency-phase2

            echo "💻 Pulling latest code from GitHub"
            git fetch origin
            git reset --hard origin/main

            echo "🧹 Cleaning up old Docker images and containers"
            docker system prune -f

            echo "📦 Stopping old containers"
            docker compose down

            echo "🔧 Building new Docker images"
            docker compose build --no-cache

            echo "⚡ Starting containers"
            docker compose up -d

            echo "✅ Deployment complete at $(date)!"
          EOF