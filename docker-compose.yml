# docker-compose.yml
version: "3.9"

services:

  backend:
    build: ./backend
    container_name: competency_backend
    ports:
      - "3001:3001"
    # volumes:
    #   - ./backend:/app
    #   - /app/node_modules
    env_file:
    - ./backend/.env
    # command: npm run start:dev
    command: npm run start:prod

  frontend:
    depends_on:
      - backend
    build: ./frontend
    container_name: competency_frontend
    ports:
      - "3002:3000"
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=/api
      # - NEXT_PUBLIC_API_URL=http://competency.kriskilsby.com:3001
    # command: npm start
    command: npm run start:prod
    
