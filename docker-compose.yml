# docker-compose.yml
services:

  backend:
    build: ./backend
    container_name: competency_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
    - .env
    command: npm run start:dev

  frontend:
    build: ./frontend
    container_name: competency_frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=/api
    command: npm start
